
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Sprout Lab — Project Showcase</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0e1117; color: #c8ced8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  /* Hero */
  .hero { position: relative; height: 80vh; overflow: hidden; }
  .hero img { width: 100%; height: 100%; object-fit: cover; }
  .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(14,17,23,0.4), transparent 50%, #0e1117); }
  .hero-content { position: absolute; bottom: 4rem; left: 0; right: 0; text-align: center; padding: 0 1.5rem; z-index: 2; }
  .badge { display: inline-block; padding: 0.25rem 0.75rem; border: 1px solid rgba(80,100,255,0.4); background: rgba(80,100,255,0.1); border-radius: 999px; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: #6b7fff; margin-bottom: 1rem; }
  h1 { font-size: clamp(2rem, 6vw, 4.5rem); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.75rem; background: linear-gradient(90deg, #c8ced8, #6b7fff); -webkit-text-fill-color: transparent; }
  .hero-sub { color: #6b7a8d; font-size: 1.1rem; max-width: 32rem; margin: 0 auto; }

  /* Divider */
  .divider { display: flex; align-items: center; gap: 1rem; margin: 3rem 0; }
  .divider span { font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: #6b7a8d; white-space: nowrap; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #1e2330; }

  /* Gallery */
  .gallery { max-width: 72rem; margin: 0 auto; padding: 3rem 1.5rem; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; }
  @media (max-width: 640px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

  .img-card { position: relative; overflow: hidden; border-radius: 0.75rem; border: 1px solid #1e2330; background: #151921; aspect-ratio: 4/3; }
  .grid-3 .img-card { aspect-ratio: 1; }
  .img-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s; }
  .img-card:hover img { transform: scale(1.05); }
  .img-caption { position: absolute; bottom: 0; left: 0; right: 0; padding: 2.5rem 1rem 1rem; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); transform: translateY(100%); transition: transform 0.5s; }
  .img-card:hover .img-caption { transform: translateY(0); }
  .img-caption p { font-size: 0.85rem; color: #fff; }
  .back-btn {
  position: fixed;
  top: 20px;
  left: 20px;
  padding: 8px 14px;
  background: rgba(20, 25, 35, 0.8);
  color: #c8ced8;
  text-decoration: none;
  border-radius: 8px;
  border: 1px solid #1e2330;
  font-size: 14px;
  backdrop-filter: blur(6px);
  transition: 0.3s;
  z-index: 1000;
}

.back-btn:hover {
  background: #6b7fff;
  color: white;
}

  /* Footer */
  footer { border-top: 1px solid #1e2330; padding: 2rem; text-align: center; font-size: 0.8rem; color: #6b7a8d; }
</style>
</head>
<body>
<a href="index.html" class="back-btn">← Back</a>
<!-- HERO — Replace src with your image URL -->
<section class="hero">
  <img src="1.jpeg" alt="Blue LED grow light setup">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="badge">Project Showcase</div>
    <h1>Urban Sprout Lab</h1>
    <p class="hero-sub">Growing microgreens with DIY blue LED light chambers — from seed to sprout.</p>
  </div>
</section>

<section class="gallery">
  <div class="divider"><span>The Build</span></div>

  <div class="grid-2">
    <figure class="img-card">
      <img src="2.jpeg" alt="Top view of grow chambers">
      <div class="img-caption"><p>Cardboard grow chambers — simple, effective, recyclable.</p></div>
    </figure>
    <figure class="img-card">
      <img src="3.jpeg" alt="Front view of setup">
      <div class="img-caption"><p>Three chambers with blue LED strips beneath.</p></div>
    </figure>
  </div>

  <div class="divider"><span>The Results</span></div>

  <div class="grid-3">
    <figure class="img-card">
      <img src="4.jpeg" alt="Sprouts in container">
      <div class="img-caption"><p>Mung bean sprouts after a few days of growth.</p></div>
    </figure>
    <figure class="img-card">
      <img src="5.jpeg" alt="Close-up of sprouts">
      <div class="img-caption"><p>Healthy roots and cotyledons emerging.</p></div>
    </figure>
  </div>
</section>

<footer>Urban Sprout Lab &middot; 2026</footer>

</body>
</html>
